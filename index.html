<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie Dev Toys - Developer Tools</title>
    <link rel="icon" type="image/webp" href="Logo.webp">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="Logo.webp" alt="Indie Dev Toys Logo" class="logo-image">
                    <span>Indie Dev Toys</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tool="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <div class="nav-section">Texture Tools</div>
                <a href="#" class="nav-item" data-tool="seamless-texture">
                    <i class="fas fa-border-all"></i>
                    <span>Seamless Texture</span>
                </a>
                <a href="#" class="nav-item" data-tool="background-remover">
                    <i class="fas fa-eraser"></i>
                    <span>Background Remover</span>
                </a>
                <a href="#" class="nav-item" data-tool="texture-dilation">
                    <i class="fas fa-expand-arrows-alt"></i>
                    <span>Texture Dilation</span>
                </a>
                <a href="#" class="nav-item" data-tool="normal-map">
                    <i class="fas fa-mountain"></i>
                    <span>Normal Map Generator</span>
                </a>
                <a href="#" class="nav-item" data-tool="channel-packer">
                    <i class="fas fa-layer-group"></i>
                    <span>Channel Packer</span>
                </a>
                <a href="#" class="nav-item" data-tool="atlas-packer">
                    <i class="fas fa-th"></i>
                    <span>Atlas Packer</span>
                </a>
                <a href="#" class="nav-item" data-tool="sprite-extractor">
                    <i class="fas fa-cut"></i>
                    <span>Sprite Extractor</span>
                </a>
                <a href="#" class="nav-item" data-tool="texture-library">
                    <i class="fas fa-sliders-h"></i>
                    <span>Quick Image Adjustment</span>
                </a>
                <div class="nav-section">Utility Tools</div>
                <a href="#" class="nav-item" data-tool="file-converter">
                    <i class="fas fa-exchange-alt"></i>
                    <span>File Converter</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <span>v1.0.0</span>
                <span>100% Browser-Based</span>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Views are loaded dynamically here -->
            <div id="view-container"></div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-cog fa-spin"></i>
            <span>Processing...</span>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/image-processor.js"></script>
    <script src="js/tools/seamless-texture.js"></script>
    <script src="js/tools/background-remover.js"></script>
    <script src="js/tools/texture-dilation.js"></script>
    <script src="js/tools/normal-map.js"></script>
    <script src="js/tools/channel-packer.js"></script>
    <script src="js/tools/atlas-packer.js"></script>
    <script src="js/tools/sprite-extractor.js"></script>
    <script src="js/tools/texture-library.js"></script>
    <!-- FFmpeg.wasm – needed for audio/video conversion (globals available before file-converter.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <script src="js/tools/file-converter.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
