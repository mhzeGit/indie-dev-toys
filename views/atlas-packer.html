<!-- Atlas Packer Tool -->
<div id="atlas-packer" class="tool-view">
    <div class="tool-header">
        <h2><i class="fas fa-th"></i> Texture Atlas Packer</h2>
        <p>Combine multiple sprites into a single optimized texture atlas.</p>
    </div>
    <div class="tool-layout">
        <div class="tool-sidebar">
            <div class="control-group">
                <label>Add Sprites</label>
                <div class="file-upload" id="atlas-upload">
                    <i class="fas fa-images"></i>
                    <span>Drop images or click to upload</span>
                    <small>Supports multiple files</small>
                    <input type="file" accept="image/*" id="atlas-input" multiple hidden>
                </div>
            </div>

            <div class="control-group">
                <label>Packing Mode</label>
                <select id="atlas-mode">
                    <option value="auto">Automatic (Bin Packing)</option>
                    <option value="grid">Grid Layout</option>
                    <option value="horizontal">Horizontal Strip</option>
                    <option value="vertical">Vertical Strip</option>
                </select>
            </div>

            <div class="control-group" id="atlas-grid-options" style="display: none;">
                <label>Grid Columns</label>
                <input type="number" id="atlas-columns" value="4" min="1" max="20">
            </div>

            <div class="control-group">
                <label>Max Atlas Size</label>
                <select id="atlas-max-size">
                    <option value="512">512 x 512</option>
                    <option value="1024">1024 x 1024</option>
                    <option value="2048" selected>2048 x 2048</option>
                    <option value="4096">4096 x 4096</option>
                    <option value="8192">8192 x 8192</option>
                </select>
            </div>

            <div class="control-group">
                <label>Padding: <span id="atlas-padding-value">2</span>px</label>
                <input type="range" id="atlas-padding" min="0" max="16" value="2">
            </div>

            <div class="control-group">
                <label>Options</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="atlas-power-of-two" checked>
                        <span>Power of 2 dimensions</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="atlas-trim">
                        <span>Trim transparent pixels</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="atlas-uniform-size">
                        <span>Uniform sprite size</span>
                    </label>
                </div>
                <small class="control-hint">Uniform size: all sprites appear same size. Use weight to adjust individual sprites.</small>
            </div>

            <div class="control-group">
                <label>Sprites (<span id="atlas-count">0</span>)</label>
                <div class="sprite-list" id="atlas-sprite-list">
                    <div class="sprite-list-empty">No sprites added yet</div>
                </div>
            </div>

            <button class="btn btn-primary btn-block" id="atlas-pack">
                <i class="fas fa-th"></i> Pack Atlas
            </button>
            <button class="btn btn-secondary btn-block" id="atlas-download" disabled>
                <i class="fas fa-download"></i> Download Atlas
            </button>
            <button class="btn btn-secondary btn-block" id="atlas-download-json" disabled>
                <i class="fas fa-file-code"></i> Download JSON Data
            </button>
        </div>

        <div class="tool-preview">
            <div class="preview-container" id="atlas-preview">
                <div class="preview-placeholder">
                    <i class="fas fa-th"></i>
                    <span>Add sprites and pack atlas</span>
                </div>
                <canvas id="atlas-canvas" style="display: none;"></canvas>
            </div>
            <div class="preview-info" id="atlas-info"></div>
        </div>
    </div>
</div>
